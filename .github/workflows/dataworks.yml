name: DataWorks SDK - simple trigger

on:
  push:
    paths:
      - 'sql/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch: {}

jobs:
  trigger-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Debug: list scripts
        run: ls -la scripts || true

      - name: Trigger DataWorks flow (SDK)
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: python scripts/trigger_flow.py --project "${{ secrets.DATAWORKS_PROJECT_CODE }}" --flow-id "${{ secrets.DATAWORKS_FLOW_ID }}"
