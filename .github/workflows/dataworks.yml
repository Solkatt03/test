name: DataWorks SDK - simple trigger

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'sql/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  trigger-flow:
    runs-on: ubuntu-latest
    environment: env                   
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      - name: Debug: check secrets presence (will NOT print values)
        run: |
          if [ -z "${{ secrets.ALIYUN_ACCESS_KEY_ID }}" ]; then echo "ALIYUN_ACCESS_KEY_ID: (empty)"; else echo "ALIYUN_ACCESS_KEY_ID: (present)"; fi
          if [ -z "${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" ]; then echo "ALIYUN_ACCESS_KEY_SECRET: (empty)"; else echo "ALIYUN_ACCESS_KEY_SECRET: (present)"; fi
          ls -la scripts || true

      - name: Trigger DataWorks flow (SDK)
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: python scripts/trigger_flow.py --project "${{ secrets.DATAWORKS_PROJECT_CODE }}" --flow-id "${{ secrets.DATAWORKS_FLOW_ID }}"
